# Trading AI Agent - Docker Compose Configuration
# Production-ready multi-container setup

version: '3.8'

services:
  # ============================================
  # TRADING ENGINE (Python Backend)
  # ============================================
  trading-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-engine
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - APP_NAME=Trading AI Agent
      - DEBUG=false
      - DATABASE_URL=postgresql://trader:trading123@postgres:5432/trading_ai
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PAPER_TRADING=${PAPER_TRADING:-true}
      # Angel One Credentials
      - ANGEL_ONE_API_KEY=${ANGEL_ONE_API_KEY}
      - ANGEL_ONE_API_SECRET=${ANGEL_ONE_API_SECRET}
      - ANGEL_ONE_CLIENT_CODE=${ANGEL_ONE_CLIENT_CODE}
      - ANGEL_ONE_PASSWORD=${ANGEL_ONE_ONE_PASSWORD}
      - ANGEL_ONE_TOTP_SECRET=${ANGEL_ONE_TOTP_SECRET}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=trading123
      - POSTGRES_DB=trading_ai
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # NEXT.JS DASHBOARD
  # ============================================
  dashboard:
    build:
      context: ../../
      dockerfile: Dockerfile.dashboard
    container_name: trading-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://trading-engine:3030
      - NEXT_PUBLIC_WS_URL=ws://trading-engine:3030
    depends_on:
      - trading-engine
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # NGINX REVERSE PROXY (Optional)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: trading-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - trading-engine
      - dashboard
    networks:
      - trading-network

# ============================================
# NETWORKS
# ============================================
networks:
  trading-network:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
