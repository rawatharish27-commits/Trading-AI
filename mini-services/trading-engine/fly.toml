# Fly.io Configuration for Trading AI Backend
# 100% FREE with 3 shared-cpu-1x VMs

app = "trading-ai-backend"
primary_region = "sin"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "3030"
  PYTHON_VERSION = "3.11"
  DEBUG = "false"
  PAPER_TRADING = "true"

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = false  # Keep always running!
  auto_start_machines = true
  min_machines_running = 1    # Always have 1 instance running

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Secrets (set via: fly secrets set KEY=VALUE)
# fly secrets set DATABASE_URL="postgresql://..."
# fly secrets set OPENAI_API_KEY="sk-xxx"
# fly secrets set OPENAI_BASE_URL="https://api.deepseek.com/v1"
